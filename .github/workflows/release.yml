name: Release Extension

on:
    push:
        branches: [main]
        paths:
            - "chrome-extension/**"
            - "packages/**"
            - "pages/**"
            - "package.json"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}

            - uses: pnpm/action-setup@v4

            - uses: actions/setup-node@v4
              with:
                  node-version-file: ".nvmrc"
                  cache: pnpm

            - run: pnpm install --frozen-lockfile --prefer-offline

            # Auto-increment version (patch) unless commit message contains [major] or [minor] or explicit version
            - name: Determine version bump
              id: version
              run: |
                  COMMIT_MSG=$(git log -1 --pretty=%B)
                  CURRENT_VERSION=$(node -p "require('./package.json').version")

                  if echo "$COMMIT_MSG" | grep -qiE '\[major\]'; then
                    BUMP="major"
                  elif echo "$COMMIT_MSG" | grep -qiE '\[minor\]'; then
                    BUMP="minor"
                  elif echo "$COMMIT_MSG" | grep -qiE 'v[0-9]+\.[0-9]+\.[0-9]+'; then
                    # Extract explicit version from commit message
                    NEW_VERSION=$(echo "$COMMIT_MSG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1)
                    echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
                    echo "Using explicit version: $NEW_VERSION"
                    exit 0
                  else
                    BUMP="patch"
                  fi

                  # Increment version
                  IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
                  case $BUMP in
                    major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
                    minor) NEW_VERSION="$MAJOR.$((MINOR + 1)).0" ;;
                    patch) NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))" ;;
                  esac

                  echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
                  echo "Bumping $BUMP: $CURRENT_VERSION -> $NEW_VERSION"

            # Update version in all package.json files
            - name: Update version
              run: bash bash-scripts/update_version.sh ${{ steps.version.outputs.version }}

            # Build the extension
            - name: Build extension
              run: pnpm build

            # Create zip
            - name: Create zip
              run: pnpm -F zipper zip

            # Commit version bump
            - name: Commit version bump
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]"
                  git push

            # Create GitHub Release
            - name: Create Release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: v${{ steps.version.outputs.version }}
                  name: Form Paglu v${{ steps.version.outputs.version }}
                  body: |
                      ## Form Paglu v${{ steps.version.outputs.version }}

                      ### Installation
                      1. Download the `.zip` file below
                      2. Go to `chrome://extensions`
                      3. Enable "Developer mode"
                      4. Click "Load unpacked" and select the extracted folder

                      ### What's New
                      See [commits since last release](https://github.com/${{ github.repository }}/commits/main)
                  files: dist/*.zip
                  generate_release_notes: true
